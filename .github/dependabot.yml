version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dotnet-minor:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/src/AgendaFlow.Web"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor:
        update-types: ["minor", "patch"]

  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: weekly
      day: monday
